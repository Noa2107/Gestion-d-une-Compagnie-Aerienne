<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <h2>Modifier un Produit Extra</h2>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/produits-extra/edit/{id}(id=${produitExtra.idProduitExtra})}" th:object="${produitExtra}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Type produit *</label>
                        <select class="form-select" th:field="*{typeProduit.idTypeProduit}" required>
                            <option value="">Selectionnez</option>
                            <option th:each="tp : ${typesProduit}"
                                    th:value="${tp.idTypeProduit}"
                                    th:selected="${produitExtra.typeProduit != null && tp.idTypeProduit == produitExtra.typeProduit.idTypeProduit}"
                                    th:text="${tp.nomTypeProduit}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom produit *</label>
                        <input type="text" class="form-control" th:field="*{nomProduit}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prix unitaire (MGA) *</label>
                        <input type="number" class="form-control" th:field="*{prixUnitaire}" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Quantite mensuelle *</label>
                        <input type="number" class="form-control" th:field="*{quantiteMensuelle}" min="0" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mois *</label>
                        <input type="number" class="form-control" th:field="*{mois}" min="1" max="12" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Annee *</label>
                        <input type="number" class="form-control" th:field="*{annee}" min="1900" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/produits-extra}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Retour
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
