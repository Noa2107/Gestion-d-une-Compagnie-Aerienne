<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Promotions Tarifs</h2>
                <a th:href="@{/promotions/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Ajouter une Promotion
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vol</th>
                        <th>Classe</th>
                        <th>Type passager</th>
                        <th>Type</th>
                        <th>Valeur</th>
                        <th>Debut</th>
                        <th>Fin</th>
                        <th>Actif</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(promotions)}">
                        <td colspan="10" class="text-center">Aucune promotion enregistree</td>
                    </tr>
                    <tr th:each="p : ${promotions}">
                        <td th:text="${p.idPromotionTarif}"></td>
                        <td th:text="${p.vol.idVol} + ' - ' + ${p.vol.aeroportDepart.code} + ' -> ' + ${p.vol.aeroportArrivee.code}"></td>
                        <td th:text="${p.classe}"></td>
                        <td th:text="${p.typePassager != null ? p.typePassager.nomType : '-'}"></td>
                        <td th:text="${p.typeReduction}"></td>
                        <td th:text="${#numbers.formatDecimal(p.valeur, 0, 'POINT', 2, 'POINT')}"></td>
                        <td th:text="${p.dateDebut != null ? #temporals.format(p.dateDebut, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                        <td th:text="${p.dateFin != null ? #temporals.format(p.dateFin, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                        <td>
                            <span th:if="${p.estActif}" class="badge bg-success">Oui</span>
                            <span th:unless="${p.estActif}" class="badge bg-secondary">Non</span>
                        </td>
                        <td>
                            <a th:href="@{/promotions/edit/{id}(id=${p.idPromotionTarif})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/promotions/delete/{id}(id=${p.idPromotionTarif})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer cette promotion?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
