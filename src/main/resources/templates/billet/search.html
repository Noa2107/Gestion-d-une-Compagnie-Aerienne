<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <h2>Recherche et Achat de Billets</h2>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/billets/search}" method="post" class="mb-4">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Aéroport départ (code)</label>
                        <input type="text" class="form-control" name="codeDepart" th:value="${codeDepart} ?: 'TNR'" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Aéroport arrivée (code)</label>
                        <input type="text" class="form-control" name="codeArrivee" th:value="${codeArrivee} ?: 'NOS'" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Date & heure</label>
                        <input type="datetime-local" class="form-control" name="dateHeure"
                               th:value="${dateHeure != null} ? ${#temporals.format(dateHeure, 'yyyy-MM-dd''T''HH:mm')} : ''" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Nombre de places</label>
                        <input type="number" class="form-control" name="nombrePlaces" min="1" th:value="${nombrePlaces} ?: 1" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Classe</label>
                        <select class="form-select" name="classe" required>
                            <option value="" th:selected="${classe == null || classe == ''}">Sélectionnez</option>
                            <option value="Economie" th:selected="${classe == 'Economie'}">Economie</option>
                            <option value="Affaires" th:selected="${classe == 'Affaires'}">Affaires</option>
                            <option value="Premiere" th:selected="${classe == 'Premiere'}">Premiere</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client (passager)</label>
                        <select class="form-select" name="idPassager" required>
                            <option value="">Sélectionnez</option>
                            <option th:each="p : ${passagers}"
                                    th:value="${p.idPassager}"
                                    th:text="${p.nom} + ' ' + ${p.prenom}"
                                    th:selected="${idPassager != null} ? ${p.idPassager == idPassager} : false">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3 d-flex align-items-end justify-content-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Rechercher
                        </button>
                    </div>
                </div>
            </form>

            <div th:if="${vols != null}">
                <h3 class="mb-3">Résultats</h3>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>Vol</th>
                            <th>Trajet</th>
                            <th>Date départ</th>
                            <th>Avion</th>
                            <th>Places dispo</th>
                            <th>Prix</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(vols)}">
                            <td colspan="7" class="text-center">Aucun vol trouvé</td>
                        </tr>
                        <tr th:each="vol : ${vols}">
                            <td th:text="${vol.codeVol} ?: ${vol.idVol}"></td>
                            <td th:text="${vol.aeroportDepart.code} + ' → ' + ${vol.aeroportArrivee.code}"></td>
                            <td th:text="${#temporals.format(vol.dateVol, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${vol.avion.immatriculation}"></td>
                            <td th:text="${placesDisponibles[vol.idVol]}"></td>
                            <td th:text="${#numbers.formatDecimal(prixTotals[vol.idVol], 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                            <td class="text-end">
                                <form th:action="@{/billets/acheter}" method="post" class="d-inline">
                                    <input type="hidden" name="idVol" th:value="${vol.idVol}">
                                    <input type="hidden" name="idPassager" th:value="${idPassager}">
                                    <input type="hidden" name="nombrePlaces" th:value="${nombrePlaces}">
                                    <input type="hidden" name="classe" th:value="${classe}">
                                    <button type="submit" class="btn btn-sm btn-success"
                                            th:disabled="${placesDisponibles[vol.idVol]} < ${nombrePlaces}">
                                        <i class="bi bi-bag-check"></i> Acheter
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
