<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Liste des Devises</h2>
                    <a th:href="@{/devises/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Ajouter une Devise
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Code</th>
                                <th>Nom</th>
                                <th>Symbole</th>
                                <th>Reference</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(devises)}">
                                <td colspan="6" class="text-center">Aucune devise enregistree</td>
                            </tr>
                            <tr th:each="devise : ${devises}">
                                <td th:text="${devise.idDevise}"></td>
                                <td th:text="${devise.codeDevise}"></td>
                                <td th:text="${devise.nomDevise}"></td>
                                <td th:text="${devise.symbole}"></td>
                                <td>
                                    <span th:if="${devise.estReference}" class="badge bg-success">Oui</span>
                                    <span th:unless="${devise.estReference}" class="badge bg-secondary">Non</span>
                                </td>
                                <td>
                                    <a th:href="@{/devises/edit/{id}(id=${devise.idDevise})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
