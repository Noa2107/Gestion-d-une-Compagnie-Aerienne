<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <h2>Paiement Reservation</h2>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/paiements/reservation/add}" th:object="${paiement}" method="post">
                    <div class="mb-3">
                        <label for="reservation" class="form-label">Reservation *</label>
                        <select class="form-select" id="reservation" th:field="*{reservation.idReservation}" required>
                            <option value="">Selectionnez une reservation</option>
                            <option th:each="reservation : ${reservations}" 
                                    th:value="${reservation.idReservation}" 
                                    th:attr="data-prix=${reservation.prixTotal}"
                                    th:text="${reservation.idReservation} + ' - Passager: ' + ${reservation.passager.nom} + ' ' + ${reservation.passager.prenom} + ' - Prix: ' + ${#numbers.formatDecimal(reservation.prixTotal, 0, 'POINT', 2, 'POINT')} + ' MGA'">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="prixReservation" class="form-label">Prix Reservation</label>
                        <input type="text" class="form-control" id="prixReservation" readonly />
                    </div>
                    
                    <div class="mb-3">
                        <label for="devise" class="form-label">Devise *</label>
                        <select class="form-select" id="devise" th:field="*{devise.idDevise}" required>
                            <option value="">Selectionnez une devise</option>
                            <option th:each="devise : ${devises}" 
                                    th:value="${devise.idDevise}" 
                                    th:text="${devise.codeDevise} + ' - ' + ${devise.nomDevise}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="montantPaye" class="form-label">Montant Paye *</label>
                        <input type="number" class="form-control" id="montantPaye" 
                               th:field="*{montantPaye}" required step="0.01" min="0"/>
                    </div>
                    
                    <div class="mb-3">
                        <label for="modePaiement" class="form-label">Mode de Paiement</label>
                        <select class="form-select" id="modePaiement" th:field="*{modePaiement}">
                            <option value="">Selectionnez</option>
                            <option value="CARTE">Carte</option>
                            <option value="ESPECES">Especes</option>
                            <option value="CHEQUE">Cheque</option>
                            <option value="VIREMENT">Virement</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="referenceTransaction" class="form-label">Reference Transaction</label>
                        <input type="text" class="form-control" id="referenceTransaction" 
                               th:field="*{referenceTransaction}" maxlength="50" readonly/>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/paiements}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
    <script>
        (function () {
            const reservationSelect = document.getElementById('reservation');
            const prixReservationInput = document.getElementById('prixReservation');
            const montantPayeInput = document.getElementById('montantPaye');

            function updatePrixEtMontant() {
                const selectedOption = reservationSelect.options[reservationSelect.selectedIndex];
                const prix = selectedOption ? selectedOption.getAttribute('data-prix') : null;

                if (!prix) {
                    prixReservationInput.value = '';
                    return;
                }

                const prixNumber = Number(prix);
                if (!Number.isFinite(prixNumber)) {
                    prixReservationInput.value = '';
                    return;
                }

                prixReservationInput.value = prixNumber.toFixed(2) + ' MGA';

                if (!montantPayeInput.value) {
                    montantPayeInput.value = prixNumber.toFixed(2);
                }
            }

            reservationSelect.addEventListener('change', updatePrixEtMontant);
            updatePrixEtMontant();
        })();
    </script>
</body>
</html>
