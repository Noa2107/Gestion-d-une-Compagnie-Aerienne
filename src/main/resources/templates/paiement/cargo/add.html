<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <h2>Paiement Cargo</h2>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/paiements/cargo/add}" th:object="${paiement}" method="post">
                    <div class="mb-3">
                        <label for="cargo" class="form-label">Cargo *</label>
                        <select class="form-select" id="cargo" th:field="*{cargo.idCargo}" required>
                            <option value="">Selectionnez un cargo</option>
                            <option th:each="cargo : ${cargos}" 
                                    th:value="${cargo.idCargo}" 
                                    th:text="${cargo.idCargo} + ' - Ref: ' + ${cargo.reference} + ' - Poids: ' + ${cargo.poids} + ' kg'">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="devise" class="form-label">Devise *</label>
                        <select class="form-select" id="devise" th:field="*{devise.idDevise}" required>
                            <option value="">Selectionnez une devise</option>
                            <option th:each="devise : ${devises}" 
                                    th:value="${devise.idDevise}" 
                                    th:text="${devise.codeDevise} + ' - ' + ${devise.nomDevise}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="montantPaye" class="form-label">Montant Paye *</label>
                        <input type="number" class="form-control" id="montantPaye" 
                               th:field="*{montantPaye}" required step="0.01" min="0"/>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="modePaiement" class="form-label">Mode de Paiement</label>
                            <select class="form-select" id="modePaiement" th:field="*{modePaiement}">
                                <option value="">Selectionnez</option>
                                <option value="CARTE">Carte</option>
                                <option value="ESPECES">Especes</option>
                                <option value="CHEQUE">Cheque</option>
                                <option value="VIREMENT">Virement</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="typeFacturation" class="form-label">Type Facturation</label>
                            <select class="form-select" id="typeFacturation" th:field="*{typeFacturation}">
                                <option value="">Selectionnez</option>
                                <option value="A_COMPTER">A compter</option>
                                <option value="COMPTANT">Comptant</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="referenceFacture" class="form-label">Reference Facture</label>
                        <input type="text" class="form-control" id="referenceFacture" 
                               th:field="*{referenceFacture}" maxlength="50"/>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/paiements}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
