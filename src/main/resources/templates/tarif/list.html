<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Tarifs Vol / Classe</h2>
                <a th:href="@{/tarifs/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Ajouter un Tarif
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vol</th>
                        <th>Classe</th>
                        <th>Type passager</th>
                        <th>Prix Unitaire</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(tarifs)}">
                        <td colspan="6" class="text-center">Aucun tarif enregistre</td>
                    </tr>
                    <tr th:each="t : ${tarifs}">
                        <td th:text="${t.idTarifVolClasse}"></td>
                        <td th:text="${t.vol.idVol} + ' - ' + ${t.vol.aeroportDepart.code} + ' -> ' + ${t.vol.aeroportArrivee.code} + ' (' + ${#temporals.format(t.vol.dateVol, 'dd/MM/yyyy HH:mm')} + ')' "></td>
                        <td th:text="${t.classe}"></td>
                        <td th:text="${t.typePassager != null ? t.typePassager.nomType : '-'}"></td>
                        <td th:text="${#numbers.formatDecimal(t.prixUnitaire, 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                        <td>
                            <a th:href="@{/tarifs/edit/{id}(id=${t.idTarifVolClasse})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/tarifs/delete/{id}(id=${t.idTarifVolClasse})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer ce tarif?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
