<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Liste des Reservations</h2>
                    <a th:href="@{/reservations/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Creer une Reservation
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Chiffre d'affaire par vol et date</h5>
                        <form th:action="@{/reservations}" method="get" class="row g-3 align-items-end">
                            <div class="col-md-5">
                                <label class="form-label">Vol</label>
                                <select class="form-select" name="idVol" required>
                                    <option value="">Selectionnez</option>
                                    <option th:each="vol : ${vols}"
                                            th:value="${vol.idVol}"
                                            th:selected="${selectedVolId != null} ? ${vol.idVol == selectedVolId} : false"
                                            th:text="${vol.idVol} + ' - ' + ${vol.aeroportDepart.code} + ' -> ' + ${vol.aeroportArrivee.code} + ' (' + ${#temporals.format(vol.dateVol, 'dd/MM/yyyy HH:mm')} + ')'">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Date et heure du vol</label>
                                <input type="datetime-local" class="form-control" name="dateHeureVol"
                                       th:value="${selectedDateHeureVol != null} ? ${#temporals.format(selectedDateHeureVol, 'yyyy-MM-dd''T''HH:mm')} : ''" required>
                            </div>
                            <div class="col-md-3 text-end">
                                <button type="submit" class="btn btn-outline-primary w-100">
                                    <i class="bi bi-calculator"></i> Calculer
                                </button>
                            </div>
                        </form>

                        <div class="mt-3" th:if="${chiffreAffaire != null}">
                            <div class="alert alert-info mb-0">
                                Total chiffre d'affaire: <strong th:text="${#numbers.formatDecimal(chiffreAffaire, 0, 'POINT', 2, 'POINT')} + ' MGA'"></strong>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Passager</th>
                                <th>Vol</th>
                                <th>Places</th>
                                <th>Numero Siege</th>
                                <th>Classe</th>
                                <th>Prix Total</th>
                                <th>Date Reservation</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(reservations)}">
                                <td colspan="9" class="text-center">Aucune reservation enregistree</td>
                            </tr>
                            <tr th:each="reservation : ${reservations}">
                                <td th:text="${reservation.idReservation}"></td>
                                <td th:text="${reservation.passager.nom} + ' ' + ${reservation.passager.prenom}"></td>
                                <td th:text="${reservation.vol.idVol} + ' - ' + ${reservation.vol.aeroportDepart.code} + ' -> ' + ${reservation.vol.aeroportArrivee.code}"></td>
                                <td th:text="${reservation.nombrePlaces}"></td>
                                <td th:text="${reservation.nombrePlaces == 1} ? ${reservation.numeroSiege} : ${reservation.siegesAttribues}"></td>
                                <td th:text="${reservation.classe}"></td>
                                <td th:text="${#numbers.formatDecimal(reservation.prixTotal, 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                                <td th:text="${#temporals.format(reservation.dateReservation, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/reservations/details/{id}(id=${reservation.idReservation})}"
                                       class="btn btn-sm btn-outline-info me-1">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/reservations/edit/{id}(id=${reservation.idReservation})}" 
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/reservations/delete/{id}(id=${reservation.idReservation})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Etes-vous sur de vouloir supprimer cette reservation?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
