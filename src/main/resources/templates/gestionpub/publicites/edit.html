<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <h2>Modifier la publicité</h2>
    <div class="card mt-2">
      <div class="card-body">
        <form th:action="@{/gestion-publicites/publicites/edit/{id}(id=${publicite.idPublicite})}" th:object="${publicite}" method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Société</label>
            <select class="form-select" name="societeId" required>
              <option th:each="s : ${societes}" th:value="${s.idSociete}" th:selected="${publicite.societe != null and s.idSociete == publicite.societe.idSociete}" th:text="${s.nom}"></option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Mois</label>
            <input type="number" min="1" max="12" class="form-control" th:field="*{mois}" required />
          </div>
          <div class="col-md-3">
            <label class="form-label">Année</label>
            <input type="number" min="2000" class="form-control" th:field="*{annee}" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Nombre de diffusions</label>
            <input type="number" min="0" class="form-control" th:field="*{nombreDiffusions}" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Prix unitaire (MGA)</label>
            <input type="number" step="0.01" class="form-control" th:field="*{prixUnitaire}" required />
          </div>
          <div class="col-12">
            <a th:href="@{/gestion-publicites/publicites}" class="btn btn-outline-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
