<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Liste des diffusions (par vol / société)</h2>
      <a th:href="@{/gestion-publicites}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Retour</a>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle mb-0">
            <thead>
              <tr>
                <th>Période</th>
                <th>Vol</th>
                <th>Avion</th>
                <th>Date</th>
                <th>Société</th>
                <th class="text-end">Nb diffusions</th>
                <th class="text-end">Prix unitaire (MGA)</th>
                <th class="text-end">Montant (MGA)</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(diffusions)}">
                <td colspan="8" class="text-center text-muted">Aucune diffusion enregistrée</td>
              </tr>
              <tr th:each="d : ${diffusions}">
                <td th:text="${d.mois} + '/' + ${d.annee}"></td>
                <td th:text="${d.aeroportDepartCode} + ' → ' + ${d.aeroportArriveeCode}"></td>
                <td th:text="${d.avionImmatriculation}"></td>
                <td th:text="${d.dateVol != null ? #temporals.format(d.dateVol, 'dd/MM/yyyy HH:mm') : ''}"></td>
                <td th:text="${d.societeNom}"></td>
                <td class="text-end" th:text="${d.nbDiffusions}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(d.prixUnitaire, 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(d.montant, 0, 'POINT', 2, 'POINT')}"></td>
              </tr>
            </tbody>
            <tfoot th:if="${not #lists.isEmpty(diffusions)}">
              <tr class="fw-bold">
                <td colspan="5" class="text-end">TOTAL</td>
                <td class="text-end" th:text="${#aggregates.sum(diffusions.![nbDiffusions])}"></td>
                <td></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(diffusions.![montant]), 0, 'POINT', 2, 'POINT')}"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
