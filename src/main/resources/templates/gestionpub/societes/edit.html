<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <h2>Modifier la société</h2>
    <div class="card mt-2">
      <div class="card-body">
        <form th:action="@{/gestion-publicites/societes/edit/{id}(id=${societe.idSociete})}" th:object="${societe}" method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input type="text" th:field="*{nom}" class="form-control" required />
            <div class="text-danger" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
          </div>
          <div class="col-12">
            <a th:href="@{/gestion-publicites/societes}" class="btn btn-outline-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
