<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Chiffre d'affaires par vol</h2>
    </div>

    <div th:if="${mois != null and annee != null}" class="d-flex gap-2 mb-2">
      <a class="btn btn-sm" th:classappend="${mode == 'par-vol'} ? ' btn-primary' : ' btn-outline-primary'"
         th:href="@{/ca-vols(mois=${mois}, annee=${annee}, avionId=${avionId}, mode='par-vol')}">Par vol</a>
      <a class="btn btn-sm" th:classappend="${mode == 'normal'} ? ' btn-primary' : ' btn-outline-primary'"
         th:href="@{/ca-vols(mois=${mois}, annee=${annee}, avionId=${avionId}, mode='normal')}">Normal</a>
    </div>

    <div class="card mb-2">
      <div class="card-body">
        <form class="row g-3 align-items-end" method="get" th:action="@{/ca-vols}">
          <div class="col-sm-3 col-md-2">
            <label class="form-label">Mois</label>
            <input type="number" min="1" max="12" placeholder="1-12" class="form-control" name="mois" th:value="${mois}" required>
          </div>
          <div class="col-sm-3 col-md-2">
            <label class="form-label">Année</label>
            <input type="number" min="2000" placeholder="ex: 2026" class="form-control" name="annee" th:value="${annee}" required>
          </div>
          <div class="col-sm-6 col-md-3">
            <label class="form-label">Avion</label>
            <select class="form-select" name="avionId">
              <option value="" th:selected="${avionId == null}">Tous</option>
              <option th:each="a : ${avions}" th:value="${a.idAvion}" th:text="${a.immatriculation}" th:selected="${avionId != null and avionId == a.idAvion}"></option>
            </select>
          </div>
          <input type="hidden" name="mode" th:value="${mode}">
          <div class="col-sm-4 col-md-3">
            <button type="submit" class="btn btn-primary"><i class="bi bi-calculator"></i> Calculer</button>
            <a th:href="@{/ca-vols}" class="btn btn-outline-secondary ms-1"><i class="bi bi-x-circle"></i> Réinitialiser</a>
          </div>
        </form>
      </div>
    </div>

    <div th:if="${mois != null and annee != null}" class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle mb-0">
            <thead>
              <tr>
                <th>Départ</th>
                <th>Arrivée</th>
                <th>Avion</th>
                <th>Date</th>
                <th>Heure</th>
                <th class="text-end">CA billets (MGA)</th>
                <th class="text-end">CA publicités (MGA)</th>
                <th class="text-end">CA produits extra (théorique) (MGA)</th>
                <th class="text-end">Payé pubs (MGA)</th>
                <th class="text-end">Reste à payer (MGA)</th>
                <th class="text-end">CA total (MGA)</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(vols)}">
                <td colspan="11" class="text-center text-muted">Aucun vol sur la période</td>
              </tr>
              <tr th:each="v : ${vols}">
                <td th:text="${v.aeroportDepartCode}"></td>
                <td th:text="${v.aeroportArriveeCode}"></td>
                <td th:text="${v.avionImmatriculation}"></td>
                <td th:text="${#temporals.format(v.dateVol, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(v.dateVol, 'HH:mm')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(v.caBillets, 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(v.caPublicites, 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(v.caProduitsExtraTheorique, 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${v.caPublicites != null and v.caPublicites.signum() > 0 ? #numbers.formatDecimal(v.montantPayePublicites, 0, 'POINT', 2, 'POINT') : '-'}"></td>
                <td class="text-end" th:text="${v.caPublicites != null and v.caPublicites.signum() > 0 ? #numbers.formatDecimal(v.resteAPayerPublicites, 0, 'POINT', 2, 'POINT') : '-'}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(v.caTotal, 0, 'POINT', 2, 'POINT')}"></td>
              </tr>
            </tbody>
            <tfoot th:if="${not #lists.isEmpty(vols)}">
              <tr class="fw-bold">
                <td colspan="5" class="text-end">TOTAL</td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![caBillets]), 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![caPublicites]), 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![caProduitsExtraTheorique]), 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![montantPayePublicites]), 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![resteAPayerPublicites]), 0, 'POINT', 2, 'POINT')}"></td>
                <td class="text-end" th:text="${#numbers.formatDecimal(#aggregates.sum(vols.![caTotal]), 0, 'POINT', 2, 'POINT')}"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
