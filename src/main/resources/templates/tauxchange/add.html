<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <h2>Ajouter un Taux de Change</h2>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/taux-change/add}" th:object="${tauxChange}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="deviseSource" class="form-label">Devise Source *</label>
                            <select class="form-select" id="deviseSource" th:field="*{deviseSource.idDevise}" required>
                                <option value="">Selectionnez une devise</option>
                                <option th:each="devise : ${devises}" 
                                        th:value="${devise.idDevise}" 
                                        th:text="${devise.codeDevise} + ' - ' + ${devise.nomDevise}">
                                </option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="deviseCible" class="form-label">Devise Cible *</label>
                            <select class="form-select" id="deviseCible" th:field="*{deviseCible.idDevise}" required>
                                <option value="">Selectionnez une devise</option>
                                <option th:each="devise : ${devises}" 
                                        th:value="${devise.idDevise}" 
                                        th:text="${devise.codeDevise} + ' - ' + ${devise.nomDevise}">
                                </option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="taux" class="form-label">Taux *</label>
                        <input type="number" class="form-control" id="taux" 
                               th:field="*{taux}" required step="0.000001" min="0.000001"/>
                        <small class="form-text text-muted">Exemple: Pour 1 USD = 4500 MGA, entrez 4500</small>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="estActif" 
                                   th:field="*{estActif}" checked/>
                            <label class="form-check-label" for="estActif">
                                Actif
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/taux-change}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
