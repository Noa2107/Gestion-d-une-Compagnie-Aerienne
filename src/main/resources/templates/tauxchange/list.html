<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Taux de Change Actifs</h2>
                    <a th:href="@{/taux-change/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Ajouter un Taux
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Devise Source</th>
                                <th>Devise Cible</th>
                                <th>Taux</th>
                                <th>Date Debut</th>
                                <th>Date Fin</th>
                                <th>Actif</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(taux)}">
                                <td colspan="7" class="text-center">Aucun taux de change actif</td>
                            </tr>
                            <tr th:each="t : ${taux}">
                                <td th:text="${t.idTaux}"></td>
                                <td th:text="${t.deviseSource.codeDevise}"></td>
                                <td th:text="${t.deviseCible.codeDevise}"></td>
                                <td th:text="${#numbers.formatDecimal(t.taux, 0, 'POINT', 6, 'POINT')}"></td>
                                <td th:text="${#temporals.format(t.dateDebutValidite, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${t.dateFinValidite != null ? #temporals.format(t.dateFinValidite, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                <td>
                                    <span th:if="${t.estActif}" class="badge bg-success">Oui</span>
                                    <span th:unless="${t.estActif}" class="badge bg-secondary">Non</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
