<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Types de Produit</h2>
                <a th:href="@{/types-produit/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Ajouter un Type
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(typesProduit)}">
                        <td colspan="4" class="text-center">Aucun type de produit enregistre</td>
                    </tr>
                    <tr th:each="tp : ${typesProduit}">
                        <td th:text="${tp.idTypeProduit}"></td>
                        <td th:text="${tp.nomTypeProduit}"></td>
                        <td th:text="${tp.description != null ? tp.description : '-'}"></td>
                        <td>
                            <a th:href="@{/types-produit/edit/{id}(id=${tp.idTypeProduit})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/types-produit/delete/{id}(id=${tp.idTypeProduit})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer ce type de produit?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
