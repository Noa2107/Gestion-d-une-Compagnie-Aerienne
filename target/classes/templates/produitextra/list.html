<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Produits Extra</h2>
                <a th:href="@{/produits-extra/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Ajouter un Produit
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Nom</th>
                        <th>Prix unitaire</th>
                        <th>Quantite</th>
                        <th>Mois</th>
                        <th>Annee</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(produitsExtra)}">
                        <td colspan="8" class="text-center">Aucun produit extra enregistre</td>
                    </tr>
                    <tr th:each="p : ${produitsExtra}">
                        <td th:text="${p.idProduitExtra}"></td>
                        <td th:text="${p.typeProduit != null ? p.typeProduit.nomTypeProduit : '-'}"></td>
                        <td th:text="${p.nomProduit}"></td>
                        <td th:text="${#numbers.formatDecimal(p.prixUnitaire, 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                        <td th:text="${p.quantiteMensuelle}"></td>
                        <td th:text="${p.mois}"></td>
                        <td th:text="${p.annee}"></td>
                        <td>
                            <a th:href="@{/produits-extra/edit/{id}(id=${p.idProduitExtra})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/produits-extra/delete/{id}(id=${p.idProduitExtra})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer ce produit extra?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
