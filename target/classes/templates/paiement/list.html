<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Liste des Paiements</h2>
                    <div>
                        <a th:href="@{/paiements/reservation/add}" class="btn btn-primary me-2">
                            <i class="bi bi-plus-circle"></i> Paiement Reservation
                        </a>
                        <a th:href="@{/paiements/cargo/add}" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Paiement Cargo
                        </a>
                    </div>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <h4 class="mt-4 mb-3">Paiements Reservation</h4>
                <div class="table-responsive mb-4">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Reservation</th>
                                <th>Montant Paye</th>
                                <th>Devise</th>
                                <th>Montant MGA</th>
                                <th>Mode Paiement</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(paiementsReservation)}">
                                <td colspan="8" class="text-center">Aucun paiement reservation</td>
                            </tr>
                            <tr th:each="p : ${paiementsReservation}">
                                <td th:text="${p.idPaiementReservation}"></td>
                                <td th:text="${p.reservation.idReservation}"></td>
                                <td th:text="${#numbers.formatDecimal(p.montantPaye, 0, 'POINT', 2, 'POINT')} + ' ' + ${p.devise.symbole}"></td>
                                <td th:text="${p.devise.codeDevise}"></td>
                                <td th:text="${#numbers.formatDecimal(p.montantReferenceMga, 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                                <td th:text="${p.modePaiement}"></td>
                                <td th:text="${#temporals.format(p.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/paiements/reservation/details/{id}(id=${p.idPaiementReservation})}"
                                       class="btn btn-sm btn-outline-info me-1">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/paiements/reservation/delete/{id}(id=${p.idPaiementReservation})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Etes-vous sur de vouloir supprimer ce paiement?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <h4 class="mt-4 mb-3">Paiements Cargo</h4>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cargo</th>
                                <th>Montant Paye</th>
                                <th>Devise</th>
                                <th>Montant MGA</th>
                                <th>Mode Paiement</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(paiementsCargo)}">
                                <td colspan="8" class="text-center">Aucun paiement cargo</td>
                            </tr>
                            <tr th:each="p : ${paiementsCargo}">
                                <td th:text="${p.idPaiementCargo}"></td>
                                <td th:text="${p.cargo.idCargo}"></td>
                                <td th:text="${#numbers.formatDecimal(p.montantPaye, 0, 'POINT', 2, 'POINT')} + ' ' + ${p.devise.symbole}"></td>
                                <td th:text="${p.devise.codeDevise}"></td>
                                <td th:text="${#numbers.formatDecimal(p.montantReferenceMga, 0, 'POINT', 2, 'POINT')} + ' MGA'"></td>
                                <td th:text="${p.modePaiement}"></td>
                                <td th:text="${#temporals.format(p.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/paiements/cargo/details/{id}(id=${p.idPaiementCargo})}"
                                       class="btn btn-sm btn-outline-info me-1">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/paiements/cargo/delete/{id}(id=${p.idPaiementCargo})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Etes-vous sur de vouloir supprimer ce paiement?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
