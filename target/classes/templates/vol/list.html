<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Liste des Vols</h2>
                    <a th:href="@{/vols/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Planifier un Vol
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Avion</th>
                                <th>Depart</th>
                                <th>Arrivee</th>
                                <th>Date Vol</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(vols)}">
                                <td colspan="7" class="text-center">Aucun vol planifie</td>
                            </tr>
                            <tr th:each="vol : ${vols}">
                                <td th:text="${vol.idVol}"></td>
                                <td th:text="${vol.avion.immatriculation}"></td>
                                <td th:text="${vol.aeroportDepart.code} + ' - ' + ${vol.aeroportDepart.ville}"></td>
                                <td th:text="${vol.aeroportArrivee.code} + ' - ' + ${vol.aeroportArrivee.ville}"></td>
                                <td th:text="${#temporals.format(vol.dateVol, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${vol.typeVol}"></td>
                                <td>
                                    <a th:href="@{/vols/edit/{id}(id=${vol.idVol})}" 
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/vols/delete/{id}(id=${vol.idVol})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Etes-vous sur de vouloir supprimer ce vol?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
