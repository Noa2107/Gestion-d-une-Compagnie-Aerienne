<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="main-area">
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Chiffre d'Affaires par vol</h2>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Selection du vol</h5>
                    <form th:action="@{/chiffre-affaires}" method="get" class="row g-3 align-items-end">
                        <div class="col-md-10">
                            <label class="form-label">Vol (Avion - Vol)</label>
                            <select class="form-select" name="idVol" required>
                                <option value="">Selectionnez</option>
                                <option th:each="v : ${vols}"
                                        th:value="${v.idVol}"
                                        th:selected="${selectedVolId != null} ? ${v.idVol == selectedVolId} : false"
                                        th:text="${v.avion.immatriculation} + ' - ' + (${v.codeVol} ?: ${v.idVol}) + ' - ' + ${v.aeroportDepart.code} + ' -> ' + ${v.aeroportArrivee.code}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2 text-end">
                            <button type="submit" class="btn btn-outline-primary w-100">
                                <i class="bi bi-calculator"></i> Calculer
                            </button>
                        </div>
                    </form>

                    <div class="mt-3" th:if="${total != null}">
                        <div class="alert alert-info mb-2">
                            CA total (paiements):
                            <strong th:text="${#numbers.formatDecimal(total, 0, 'POINT', 2, 'POINT')} + ' MGA'"></strong>
                        </div>

                        <div class="alert alert-light mb-3">
                            <div class="fw-bold mb-2">CA par classe</div>
                            <div th:if="${caParClasse != null}">
                                <div th:each="entry : ${caParClasse.entrySet()}">
                                    <span th:text="${entry.key}"></span>:
                                    <strong th:text="${#numbers.formatDecimal(entry.value, 0, 'POINT', 2, 'POINT')} + ' MGA'"></strong>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-light mb-0">
                            <div class="fw-bold mb-2">CA par classe et type passager</div>
                            <div th:if="${caParClasseEtType != null}">
                                <div th:each="classeEntry : ${caParClasseEtType.entrySet()}" class="mb-2">
                                    <div class="fw-semibold" th:text="${classeEntry.key}"></div>
                                    <div th:each="typeEntry : ${classeEntry.value.entrySet()}" class="ms-3">
                                        <span th:text="${typeEntry.key}"></span>:
                                        <strong th:text="${#numbers.formatDecimal(typeEntry.value, 0, 'POINT', 2, 'POINT')} + ' MGA'"></strong>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="text-muted mt-2" th:if="${vol != null}">
                            Vol: <span th:text="${vol.idVol}"></span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
