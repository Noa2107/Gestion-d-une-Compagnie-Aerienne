<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Liste des Aeroports</h2>
                    <a th:href="@{/aeroports/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Ajouter un Aeroport
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Code</th>
                                <th>Nom</th>
                                <th>Ville</th>
                                <th>Pays</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(aeroports)}">
                                <td colspan="6" class="text-center">Aucun aeroport enregistre</td>
                            </tr>
                            <tr th:each="aeroport : ${aeroports}">
                                <td th:text="${aeroport.idAeroport}"></td>
                                <td th:text="${aeroport.code}"></td>
                                <td th:text="${aeroport.nom}"></td>
                                <td th:text="${aeroport.ville}"></td>
                                <td th:text="${aeroport.pays}"></td>
                                <td>
                                    <a th:href="@{/aeroports/edit/{id}(id=${aeroport.idAeroport})}" 
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/aeroports/delete/{id}(id=${aeroport.idAeroport})}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Etes-vous sur de vouloir supprimer cet aeroport?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
