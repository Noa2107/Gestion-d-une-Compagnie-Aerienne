<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <h2>Modifier un Aeroport</h2>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/aeroports/edit/{id}(id=${aeroport.idAeroport})}" th:object="${aeroport}" method="post">
                    <div class="mb-3">
                        <label for="code" class="form-label">Code *</label>
                        <input type="text" class="form-control" id="code" 
                               th:field="*{code}" required maxlength="10"/>
                        <div th:if="${#fields.hasErrors('code')}" 
                             th:errors="*{code}" class="text-danger"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="nom" 
                               th:field="*{nom}" maxlength="100"/>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="ville" class="form-label">Ville *</label>
                            <input type="text" class="form-control" id="ville" 
                                   th:field="*{ville}" required maxlength="100"/>
                            <div th:if="${#fields.hasErrors('ville')}" 
                                 th:errors="*{ville}" class="text-danger"></div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="pays" class="form-label">Pays *</label>
                            <input type="text" class="form-control" id="pays" 
                                   th:field="*{pays}" required maxlength="100"/>
                            <div th:if="${#fields.hasErrors('pays')}" 
                                 th:errors="*{pays}" class="text-danger"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/aeroports}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
