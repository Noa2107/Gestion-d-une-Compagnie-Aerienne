<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <h2>Gestion des publicités</h2>
    <div class="row g-3 mt-2">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Sociétés</h5>
            <p class="mb-2">Total: <span class="fw-bold" th:text="${societesCount}"></span></p>
            <a th:href="@{/gestion-publicites/societes}" class="btn btn-primary btn-sm">Gérer les sociétés</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Publicités</h5>
            <p class="mb-2">Total: <span class="fw-bold" th:text="${publicitesCount}"></span></p>
            <a th:href="@{/gestion-publicites/publicites}" class="btn btn-primary btn-sm">Gérer les publicités</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Diffusions</h5>
            <p class="mb-2">Liste des diffusions par vol et société</p>
            <a th:href="@{/gestion-publicites/diffusions}" class="btn btn-primary btn-sm">Voir les diffusions</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
