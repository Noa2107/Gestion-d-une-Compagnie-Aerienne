<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Sociétés</h2>
      <a th:href="@{/gestion-publicites/societes/add}" class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> Nouvelle société</a>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(societes)}">
                <td colspan="3" class="text-center">Aucune société</td>
              </tr>
              <tr th:each="s : ${societes}">
                <td th:text="${s.idSociete}"></td>
                <td th:text="${s.nom}"></td>
                <td class="text-end">
                  <a class="btn btn-sm btn-primary me-1" th:href="@{/gestion-publicites/societes/{id}/detail(id=${s.idSociete})}"><i class="bi bi-list-task"></i> Détail</a>
                  <a class="btn btn-sm btn-outline-secondary" th:href="@{/gestion-publicites/societes/edit/{id}(id=${s.idSociete})}"><i class="bi bi-pencil"></i></a>
                  <form th:action="@{/gestion-publicites/societes/delete/{id}(id=${s.idSociete})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer cette société ?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
