<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
  <div class="main-area">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Détail société</h2>
      <a th:href="@{/gestion-publicites/societes}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Retour</a>
    </div>

    <div class="card mb-2">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <div class="text-muted">Société</div>
            <div class="fs-5" th:text="${societe.nom}"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <form class="row g-3 align-items-end" method="get" th:action="@{'/gestion-publicites/societes/' + ${societe.idSociete} + '/detail'}">
          <div class="col-sm-4 col-md-3">
            <label class="form-label">Date début</label>
            <input type="date" class="form-control" name="dateDebut" th:value="${dateDebut}" required>
          </div>
          <div class="col-sm-4 col-md-3">
            <label class="form-label">Date fin</label>
            <input type="date" class="form-control" name="dateFin" th:value="${dateFin}" required>
          </div>
          <div class="col-sm-4 col-md-3">
            <label class="form-label">Avion</label>
            <select class="form-select" name="avionId">
              <option value="" th:selected="${avionId == null}">Tous</option>
              <option th:each="a : ${avions}"
                      th:value="${a.idAvion}"
                      th:selected="${avionId != null and a.idAvion == avionId}"
                      th:text="${a.immatriculation}"></option>
            </select>
          </div>
          <div class="col-sm-4 col-md-3">
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Rechercher vols</button>
            <a th:href="@{'/gestion-publicites/societes/' + ${societe.idSociete} + '/detail'}" class="btn btn-outline-secondary ms-1"><i class="bi bi-x-circle"></i> Réinitialiser</a>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="card-title mb-0">Vols trouvés</h6>
          <span class="badge bg-light text-secondary" th:text="${#lists.size(vols)} + ' vols'"></span>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle">
            <thead>
              <tr>
                <th>Départ</th>
                <th>Arrivée</th>
                <th>Avion</th>
                <th>Date</th>
                <th>Heure</th>
                <th class="text-end">Nb diffusions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(vols)}">
                <td colspan="6" class="text-center text-muted">Aucun vol pour l'intervalle sélectionné</td>
              </tr>
              <tr th:each="v : ${vols}">
                <td th:text="${v.aeroportDepart != null ? v.aeroportDepart.code : ''}"></td>
                <td th:text="${v.aeroportArrivee != null ? v.aeroportArrivee.code : ''}"></td>
                <td th:text="${v.avion != null ? v.avion.immatriculation : ''}"></td>
                <td th:text="${#temporals.format(v.dateVol, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(v.dateVol, 'HH:mm')}"></td>
                <td class="text-end">
                  <form th:action="@{'/gestion-publicites/societes/' + ${societe.idSociete} + '/diffuser'}" method="post" class="d-inline-flex gap-1 align-items-center justify-content-end">
                    <input type="hidden" name="idVol" th:value="${v.idVol}">
                    <input type="hidden" name="dateDebut" th:value="${dateDebut}">
                    <input type="hidden" name="dateFin" th:value="${dateFin}">
                    <input type="number" name="nbDiffusions" min="1" step="1" class="form-control form-control-sm" placeholder="Nb">
                    <button type="submit" class="btn btn-sm btn-success"><i class="bi bi-plus-circle"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
