<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="main-area">
            <div class="content-card">
                <h2>Modifier un Cargo</h2>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/cargo/edit/{id}(id=${cargo.idCargo})}" th:object="${cargo}" method="post">
                    <div class="mb-3">
                        <label for="reference" class="form-label">Reference</label>
                        <input type="text" class="form-control" id="reference" 
                               th:field="*{reference}" maxlength="50"/>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="poids" class="form-label">Poids (kg) *</label>
                            <input type="number" class="form-control" id="poids" 
                                   th:field="*{poids}" required min="1"/>
                            <div th:if="${#fields.hasErrors('poids')}" 
                                 th:errors="*{poids}" class="text-danger"></div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="typeMarchandise" class="form-label">Type de Marchandise</label>
                            <input type="text" class="form-control" id="typeMarchandise" 
                                   th:field="*{typeMarchandise}" maxlength="50"/>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="expediteur" class="form-label">Expediteur</label>
                            <input type="text" class="form-control" id="expediteur" 
                                   th:field="*{expediteur}" maxlength="100"/>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="destinataire" class="form-label">Destinataire</label>
                            <input type="text" class="form-control" id="destinataire" 
                                   th:field="*{destinataire}" maxlength="100"/>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="adresseDepart" class="form-label">Adresse Depart</label>
                        <input type="text" class="form-control" id="adresseDepart" 
                               th:field="*{adresseDepart}" maxlength="150"/>
                    </div>
                    
                    <div class="mb-3">
                        <label for="adresseArrivee" class="form-label">Adresse Arrivee</label>
                        <input type="text" class="form-control" id="adresseArrivee" 
                               th:field="*{adresseArrivee}" maxlength="150"/>
                    </div>
                    
                    <div class="mb-3">
                        <label for="valeurDeclaree" class="form-label">Valeur Declaree</label>
                        <input type="number" class="form-control" id="valeurDeclaree" 
                               th:field="*{valeurDeclaree}" step="0.01" min="0"/>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/cargo}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
